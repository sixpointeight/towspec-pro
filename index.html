<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TowSpec Pro | Recovery Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        #interactive.viewport {
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
            background: #000;
            border: 4px solid #334155;
            border-radius: 12px;
        }
        #interactive.viewport video, #interactive.viewport canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .drawingBuffer { position: absolute; top: 0; left: 0; }
        .section-card { border-left: 4px solid; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-10">

    <nav class="bg-slate-900 text-white p-5 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">TOWSPEC <span class="text-yellow-400">PRO</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400">Roadside Assistance Database</p>
            </div>
            <div id="db-badge" class="bg-slate-600 text-slate-300 text-xs font-bold px-2 py-1 rounded">LOADING...</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">

        <div class="grid grid-cols-1 gap-3 mb-6">
            <button onclick="startScanner()" id="btn-scan" class="bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                <span>📷</span> SCAN VIN BARCODE
            </button>
            <div class="relative">
                <input type="text" id="manualVin" placeholder="Enter 17-digit VIN manually..." class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none uppercase font-mono">
                <button onclick="handleManualVin()" class="absolute right-2 top-2 bg-slate-800 text-white px-4 py-2 rounded-lg font-bold">GO</button>
            </div>
        </div>

        <div id="scanner-container" class="hidden mb-6">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-slate-700">Align Barcode in Window</h3>
                <button onclick="stopScanner()" class="text-red-500 font-bold px-2">Close X</button>
            </div>
            <div id="interactive" class="viewport"></div>
            <p class="text-xs text-center text-slate-500 mt-2 italic font-medium">Scanning for Code 128 / Code 39...</p>
        </div>

        <div id="results-area" class="space-y-4">
            <div id="placeholder" class="text-center py-20 border-2 border-dashed border-slate-300 rounded-3xl text-slate-400">
                <p>Scan a vehicle or enter VIN<br>to see towing procedures.</p>
            </div>
        </div>

    </main>

    <script>
        const SECTION_CONFIG = {
            'Tow Information':          { icon: '🚛', color: 'bg-red-50',    border: 'border-red-500',    label: 'text-red-700' },
            'Shift Interlock Override': { icon: '⚙️', color: 'bg-orange-50', border: 'border-orange-500', label: 'text-orange-700' },
            'Service Information':      { icon: '🔧', color: 'bg-yellow-50', border: 'border-yellow-500', label: 'text-yellow-700' },
            'Battery Location':         { icon: '🔋', color: 'bg-green-50',  border: 'border-green-600',  label: 'text-green-700' },
            'Jump Starting':            { icon: '⚡', color: 'bg-blue-50',   border: 'border-blue-500',   label: 'text-blue-700' },
            'Tire Service':             { icon: '🔩', color: 'bg-indigo-50', border: 'border-indigo-500', label: 'text-indigo-700' },
            'Fuel Type':                { icon: '⛽', color: 'bg-purple-50', border: 'border-purple-500', label: 'text-purple-700' },
            'Fuel Delivery':            { icon: '🪣', color: 'bg-purple-50', border: 'border-purple-500', label: 'text-purple-700' },
            'Electronic Key':           { icon: '🔑', color: 'bg-slate-100', border: 'border-slate-400',  label: 'text-slate-700' },
        };
        const DEFAULT_CONFIG = { icon: '📋', color: 'bg-slate-50', border: 'border-slate-300', label: 'text-slate-700' };

        // ── Database ──────────────────────────────────────────────────
        let aaaDatabase = [];

        async function loadDatabase() {
            try {
                const res = await fetch('/vehicles.json');
                aaaDatabase = await res.json();
                const badge = document.getElementById('db-badge');
                badge.textContent = aaaDatabase.length.toLocaleString() + ' VEHICLES';
                badge.className = 'bg-yellow-500 text-slate-900 text-xs font-bold px-2 py-1 rounded';
            } catch (e) {
                document.getElementById('db-badge').textContent = 'DB ERROR';
                document.getElementById('db-badge').className = 'bg-red-500 text-white text-xs font-bold px-2 py-1 rounded';
            }
        }
        loadDatabase();

        function lookupVehicle(year, make, model) {
            const normMake = make.trim().toLowerCase();
            const normModel = model.trim().toLowerCase();
            const normYear = parseInt(year);
            return aaaDatabase.filter(v => {
                const makeMatch = v.make.toLowerCase() === normMake || normMake.includes(v.make.toLowerCase()) || v.make.toLowerCase().includes(normMake);
                const modelMatch = v.model.toLowerCase() === normModel || normModel.includes(v.model.toLowerCase()) || v.model.toLowerCase().includes(normModel);
                return v.year === normYear && makeMatch && modelMatch;
            });
        }

        // ── Scanner ───────────────────────────────────────────────────
        function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            Quagga.init({
                inputStream: {
                    name: "Live", type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { width: { min: 1280, ideal: 1920 }, height: { min: 720, ideal: 1080 }, facingMode: "environment", aspectRatio: { ideal: 1.7777777778 } }
                },
                decoder: { readers: ["code_128_reader", "code_39_reader"] }
            }, (err) => { if (err) { alert("Camera error: " + err); return; } Quagga.start(); });
            Quagga.onDetected((data) => {
                const vin = data.codeResult.code;
                if (vin.length === 17) { stopScanner(); processVin(vin); }
            });
        }

        function stopScanner() {
            Quagga.stop();
            document.getElementById('scanner-container').classList.add('hidden');
        }

        function handleManualVin() {
            const vin = document.getElementById('manualVin').value.trim();
            if (vin.length === 17) { processVin(vin); }
            else { alert("Please enter a valid 17-digit VIN."); }
        }

        // ── VIN Processing ────────────────────────────────────────────
        async function processVin(vin) {
            const resultsArea = document.getElementById('results-area');
            resultsArea.innerHTML = `<div class="text-center py-10 font-bold text-blue-600 animate-pulse text-lg">DECODING VIN...</div>`;
            try {
                const response = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVinValues/${vin}?format=json`);
                const data = await response.json();
                const vInfo = data.Results[0];
                const matches = lookupVehicle(vInfo.ModelYear, vInfo.Make, vInfo.Model);
                renderResult(vInfo, matches, vin);
            } catch (error) {
                resultsArea.innerHTML = `<div class="bg-red-100 p-4 text-red-700 rounded-lg">Error connecting to database. Please check connection.</div>`;
            }
        }

        function fuelTypeColor(fuelType) {
            const f = (fuelType || '').toLowerCase();
            if (f.includes('electric')) return 'bg-green-600';
            if (f.includes('hybrid')) return 'bg-teal-600';
            if (f.includes('diesel')) return 'bg-orange-600';
            if (f.includes('hydrogen')) return 'bg-purple-600';
            return 'bg-slate-600';
        }

        // ── Render helpers ────────────────────────────────────────────

        function renderTowPics(towPics) {
            if (!towPics || !towPics.length) return '';
            const cols = towPics.map(col => `
                <div class="text-center">
                    <p class="text-[10px] font-black text-red-600 uppercase tracking-wider mb-1">${col.label}</p>
                    <div class="flex gap-1 justify-center flex-wrap">
                        ${col.images.map(src => `<img src="${src}" alt="${col.label}" class="h-16 object-contain rounded border border-red-200 bg-white p-1" onerror="this.style.display='none'">`).join('')}
                    </div>
                </div>`).join('');
            return `<div class="grid grid-cols-2 gap-3 mt-3 pt-3 border-t border-red-200">${cols}</div>`;
        }

        function renderLockoutCard(lockout) {
            const diffBadge = lockout.difficultyLevel ? `
                <div class="flex items-start gap-2 bg-white rounded-lg p-2 mb-3 border border-slate-200">
                    <span class="font-black text-lg text-slate-900 shrink-0">${lockout.difficultyLevel}</span>
                    ${lockout.difficultyDesc ? `<span class="text-xs text-slate-500 italic leading-relaxed">${lockout.difficultyDesc}</span>` : ''}
                </div>` : '';

            const pics = lockout.pictures && lockout.pictures.length ? `
                <div class="grid grid-cols-3 gap-2 mb-3">
                    ${lockout.pictures.map(p => `
                        <div class="text-center">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">${p.label}</p>
                            <img src="${p.src}" alt="${p.label}" class="w-full rounded-lg border border-slate-200 bg-white" onerror="this.style.display='none'">
                        </div>`).join('')}
                </div>` : '';

            const metaRows = [
                lockout.warnings ? `<tr><td class="py-1 pr-3 font-bold text-slate-600 whitespace-nowrap align-top">Warnings</td><td class="py-1 text-slate-800">${lockout.warnings}</td></tr>` : '',
                lockout.linkage  ? `<tr><td class="py-1 pr-3 font-bold text-slate-600 whitespace-nowrap align-top">Linkage</td><td class="py-1 text-slate-800">${lockout.linkage}</td></tr>` : '',
            ].join('');
            const metaTable = metaRows ? `<table class="w-full text-xs mb-3">${metaRows}</table>` : '';

            const instructions = lockout.openingInstructions ? `
                <p class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1">Opening Instructions</p>
                <p class="text-slate-800 text-sm leading-relaxed">${lockout.openingInstructions}</p>` : '';

            const cautions = lockout.cautions ? `
                <div class="bg-yellow-50 border border-yellow-300 rounded-lg p-2 mt-3">
                    <p class="text-xs font-black text-yellow-700 mb-1">⚠ CAUTIONS</p>
                    <p class="text-xs text-yellow-800 leading-relaxed">${lockout.cautions}</p>
                </div>` : '';

            return `
                <div class="section-card bg-slate-100 border-slate-500 p-4 rounded-xl">
                    <h3 class="font-black text-sm uppercase tracking-tight text-slate-700 mb-3 flex items-center gap-2">
                        <span>🔐</span> Lockout Procedures
                    </h3>
                    ${diffBadge}${pics}${metaTable}${instructions}${cautions}
                </div>`;
        }

        // ── Render ────────────────────────────────────────────────────
        function renderResult(vInfo, matches, vin) {
            const resultsArea = document.getElementById('results-area');

            let variantsHTML = '';
            if (matches.length > 0) {
                const btns = matches.map((v, i) => `
                    <button onclick="loadProcedure('${v.url}', ${i})" id="variant-btn-${i}"
                        class="flex items-center justify-between w-full p-3 bg-slate-50 hover:bg-blue-50 border-2 border-slate-200 hover:border-blue-400 rounded-xl transition-colors group text-left">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-black text-slate-800 text-sm">${v.drivetrain}</span>
                            <span class="text-xs font-bold px-2 py-0.5 rounded text-white ${fuelTypeColor(v.fuelType)}">${v.fuelType}</span>
                        </div>
                        <span class="text-blue-600 font-bold text-xs">LOAD ▶</span>
                    </button>`).join('');

                variantsHTML = `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-black uppercase text-slate-500 tracking-widest mb-3">
                        ${matches.length} AAA RSI Configuration${matches.length > 1 ? 's' : ''} Found
                    </p>
                    <div class="space-y-2">${btns}</div>
                </div>`;
            } else {
                variantsHTML = `
                <div class="bg-slate-100 p-6 rounded-2xl text-center">
                    <p class="font-bold text-slate-500 text-sm">No AAA RSI procedure found for this vehicle.</p>
                    <p class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest">Default to Flatbed Recovery</p>
                </div>`;
            }

            resultsArea.innerHTML = `
                <div>
                    <div class="bg-slate-900 text-white p-5 rounded-2xl mb-4">
                        <p class="text-xs text-slate-400 font-mono mb-1">${vin}</p>
                        <h2 class="text-2xl font-black italic tracking-tighter">${vInfo.ModelYear} ${vInfo.Make} ${vInfo.Model}</h2>
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${vInfo.DriveType ? `<span class="bg-slate-700 text-[10px] px-2 py-1 rounded font-bold uppercase">${vInfo.DriveType}</span>` : ''}
                            ${vInfo.FuelTypePrimary ? `<span class="bg-slate-700 text-[10px] px-2 py-1 rounded font-bold uppercase">${vInfo.FuelTypePrimary}</span>` : ''}
                            ${vInfo.BodyClass ? `<span class="bg-slate-700 text-[10px] px-2 py-1 rounded font-bold uppercase">${vInfo.BodyClass}</span>` : ''}
                        </div>
                    </div>
                    ${variantsHTML}
                    <div id="procedure-detail"></div>
                </div>`;

            if (matches.length === 1) {
                loadProcedure(matches[0].url, 0);
            }
        }

        // ── Load Full Procedure ───────────────────────────────────────
        async function loadProcedure(url, variantIndex) {
            document.querySelectorAll('[id^="variant-btn-"]').forEach(b => {
                b.className = b.className.replace('border-blue-400 bg-blue-50', 'border-slate-200 bg-slate-50');
            });
            const activeBtn = document.getElementById(`variant-btn-${variantIndex}`);
            if (activeBtn) {
                activeBtn.className = activeBtn.className.replace('border-slate-200 bg-slate-50', 'border-blue-400 bg-blue-50');
                activeBtn.querySelector('span:last-child').textContent = '⏳';
            }

            const detail = document.getElementById('procedure-detail');
            detail.innerHTML = `<div class="text-center py-8 font-bold text-blue-600 animate-pulse text-sm mt-4">LOADING PROCEDURE...</div>`;

            try {
                const res = await fetch(`/api/procedure?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.error) {
                    detail.innerHTML = `<div class="bg-red-100 p-4 text-red-700 rounded-lg mt-4 text-sm">${data.error}</div>`;
                    return;
                }

                if (activeBtn) activeBtn.querySelector('span:last-child').textContent = '✓';

                const sections = data.sections || {};
                const sectionKeys = Object.keys(sections);

                if (sectionKeys.length === 0 && !data.lockout) {
                    detail.innerHTML = `<div class="bg-slate-100 p-6 rounded-2xl text-center mt-4 text-sm text-slate-500">No detailed procedure content available.</div>`;
                    return;
                }

                const sectionsHTML = sectionKeys.map(key => {
                    const cfg = SECTION_CONFIG[key] || DEFAULT_CONFIG;
                    const extra = (key === 'Tow Information' && data.towPics) ? renderTowPics(data.towPics) : '';
                    return `
                    <div class="section-card ${cfg.color} ${cfg.border} p-4 rounded-xl">
                        <h3 class="font-black text-sm uppercase tracking-tight ${cfg.label} mb-2 flex items-center gap-2">
                            <span>${cfg.icon}</span> ${key}
                        </h3>
                        <p class="text-slate-800 text-sm leading-relaxed">${sections[key]}</p>
                        ${extra}
                    </div>`;
                }).join('');

                const lockoutHTML = data.lockout ? renderLockoutCard(data.lockout) : '';

                detail.innerHTML = `
                    <div class="mt-4 space-y-3">
                        <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">AAA RSI Procedure Data</p>
                        ${sectionsHTML}
                        ${lockoutHTML}
                        <p class="text-[10px] text-slate-400 italic text-center pt-2">
                            Data sourced from <a href="${url}" target="_blank" class="underline">rsi.aaa.biz</a>
                        </p>
                    </div>`;

            } catch (e) {
                detail.innerHTML = `<div class="bg-red-100 p-4 text-red-700 rounded-lg mt-4 text-sm">Failed to load procedure: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
